services:
  rinha:
    build:
      context: "."
      dockerfile: "./dockerfile"
    hostname: "rinha"
    container_name: "rinha"
    ports:
      - target: "9999"
        published: "9999"
        protocol: "tcp"
        mode: "host"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "350MB"

networks:
  payment-processor:
    external: true
