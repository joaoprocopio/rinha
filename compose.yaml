services:
  rinha:
    build:
      context: "."
      dockerfile: "./dockerfile"
    platform: "linux/amd64"
    networks:
      - "payment-processor"
    environment:
      RINHA_HOST: "0.0.0.0"
      RINHA_PORT: "9999"
      RINHA_DEFAULT_BACKEND_HOST: "127.0.0.1"
      RINHA_DEFAULT_BACKEND_PORT: "8001"
      RINHA_FALLBACK_BACKEND_HOST: "127.0.0.1"
      RINHA_FALLBACK_BACKEND_PORT: "8002"
    ports:
      - target: "9999"
        published: "9999"
        protocol: "tcp"
        mode: "host"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "350MB"
        reservations:
          cpus: "1.5"
          memory: "350MB"

networks:
  payment-processor:
    external: true
