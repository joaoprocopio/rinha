[package]
name = "rinha"
version = "0.1.0"
edition = "2024"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true
split-debuginfo = '...'  # Platform-specific.
strip = "none"
debug-assertions = true
overflow-checks = true
lto = false
panic = 'unwind'
incremental = true
codegen-units = 256
rpath = false


[dependencies]
async-trait = "0.1.88"
chrono = { version = "0.4.41", features = ["serde"]}
http = "1.3.1"
jemallocator = "0.5.4"
pingora = { version = "0.5.0", features = ["lb"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.141"
tokio = "1.47.0"
uuid = { version = "1.17.0", features = ["serde", "v4"]}
